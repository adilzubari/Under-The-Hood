name: Regenerate generated docs

# When any topic markdown changes on main, re-run the generator scripts and
# commit refreshed outputs back. No local work required.
#
# Currently generates:
#   - docs/interview-bank/{by-difficulty,by-topic,all-questions}.md
#   - docs/progress.md
#   - docs/tags.md
#   - exports/flashcards.csv (Anki import)

on:
  push:
    branches: [main]
    paths:
      - 'docs/**/*.md'
      - '.github/scripts/*.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    # Prevent loops when this workflow commits back to main.
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Regenerate Q&A bank
        run: python3 .github/scripts/build_qa_bank.py

      - name: Regenerate progress dashboard
        run: python3 .github/scripts/build_progress.py

      - name: Regenerate tags index
        run: python3 .github/scripts/build_tags.py

      - name: Regenerate Anki flashcard export
        run: python3 .github/scripts/build_anki.py

      - name: Commit changes (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain docs/ exports/)" ]]; then
            git add docs/interview-bank/ docs/progress.md docs/tags.md exports/
            git commit -m "chore: regenerate generated docs [skip ci]"
            git push
          else
            echo "Generated docs are already up to date — nothing to commit."
          fi
