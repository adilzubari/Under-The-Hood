          - Singleton: 01-programming-fundamentals/design-patterns/singleton.md
          - Factory: 01-programming-fundamentals/design-patterns/factory.md
          - Strategy: 01-programming-fundamentals/design-patterns/strategy.md
          - Observer: 01-programming-fundamentals/design-patterns/observer.md
          - Decorator: 01-programming-fundamentals/design-patterns/decorator.md
          - Adapter: 01-programming-fundamentals/design-patterns/adapter.md
          - Proxy: 01-programming-fundamentals/design-patterns/proxy.md
          - Builder: 01-programming-fundamentals/design-patterns/builder.md
          - Chain of Responsibility: 01-programming-fundamentals/design-patterns/chain-of-responsibility.md
      - Dependency Injection: 01-programming-fundamentals/dependency-injection.md
      - Async & Concurrency: 01-programming-fundamentals/async-concurrency.md
      - Memory & GC: 01-programming-fundamentals/memory-management.md
      - Error Handling: 01-programming-fundamentals/error-handling.md
      - Logging & Observability: 01-programming-fundamentals/logging-observability.md
      - Testing Frameworks: 01-programming-fundamentals/testing-frameworks.md
  - "2. Backend & APIs": 02-backend-apis/index.md
  - "3. Database & Storage": 03-database-storage/index.md
  - "4. System Design": 04-system-design-architecture/index.md
  - "5. Networking": 05-networking-communication/index.md
  - "6. Concurrency & Async": 06-concurrency-async/index.md
  - "7. Cloud & Infrastructure": 07-cloud-infrastructure/index.md
  - "8. Security": 08-security/index.md
  - "9. Scalability & Performance": 09-scalability-performance/index.md
  - "10. DevOps & Observability": 10-devops-observability/index.md
  - "11. Testing & Quality": 11-testing-quality/index.md
  - "12. Data Pipelines & Messaging": 12-data-pipelines-messaging/index.md
  - "13. System Design Patterns": 13-design-patterns-system/index.md
  - "14. Resilience & Fault Tolerance": 14-resilience-fault-tolerance/index.md
  - "15. Distributed Systems": 15-distributed-systems/index.md
  - "16. API Lifecycle": 16-api-lifecycle/index.md
  - "17. Caching & Optimization": 17-caching-optimization/index.md
  - "18. Search & Indexing": 18-search-indexing/index.md
  - "19. API Reliability & Observability": 19-api-reliability-observability/index.md
  - "20. Soft Skills & System Design": 20-soft-skills-system-design/index.md
